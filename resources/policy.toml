# Gaze policy - Laravel adapter default
#
# Schema: v0.4 ([[policy.custom_recognizers]]). Compatible with pinned
# upstream binary v0.6.4. Verify with `vendor/bin/gaze --version`.
#
# Activates the unified `core` rulepack (email + email-header names, phone,
# IBAN, credit card, IP, postal codes — `core-extended` was folded into
# `core` upstream as of gaze v0.8.0). Adds custom recognizers for money
# amounts, invoice/order numbers, street addresses, and orgs with legal
# suffix. Person-name detection is delegated to the optional NER model
# (see commented [ner] block + issue #32: php artisan gaze:install-ner).
#
# Locale-gating note: under `en-US`, bare 5-digit numbers tokenize as
# postal codes (US ZIP). If your app emits 5-digit order IDs, ticket numbers,
# or year-fragments in user-visible text, drop "en-US" from [locale].active
# below to disable postal.us. The DE postal recognizer (`postal.de`) is
# bound to "de-DE".
#
# Extending: append [[policy.custom_recognizers]] blocks for adopter-specific
# regexes. See https://github.com/CertaMesh/gaze/blob/main/docs/policy.md
# for the full schema reference.

[session]
scope = "persistent"
ttl_secs = 86400

[locale]
active = ["de-DE", "en-US"]

[policy.rulepacks]
# v0.8: 'core-extended' was unified into 'core'. Pass --locale (or set GAZE_LOCALE) to activate phone.national.* / postal.* recognizers. See https://github.com/CertaMesh/gaze/blob/main/UPGRADE.md
bundled = ["core"]

# [ner]
# # Optional named-entity recognition for person/org/location detection.
# # Set `model_dir` to a directory containing a HuggingFace token-classification
# # model (e.g. davlan/distilbert-base-multilingual-cased-ner-hrl). NOTE: TOML
# # does NOT expand env() or ${VAR} - uncomment and edit the path literally,
# # or wait for `php artisan gaze:install-ner` (#32) to manage it.
# model_dir = "storage/app/gaze-ner/davlan-mbert-ner-hrl"
# locale = "de"
# threshold = 0.7

# Money amounts. Currency token (€/$/£/EUR/USD/GBP) on either side of digits
# with optional thousand-separator + decimal groups. Word boundaries (\b) prevent
# matching inside identifiers (e.g. abc5000EURdef stays preserved because c↔5 has no \b).
# Fixes the `\d{1,3}` thousand-separator bug - `5000€` tokenizes whole.
[[policy.custom_recognizers]]
kind = "regex"
name = "money_amount"
class = "custom:amount"
pattern = '(?i)\b(?:(?:€|\$|£|EUR|USD|GBP)\s?\d+(?:[.,]\d+)*|\d+(?:[.,]\d+)*\s?(?:€|\$|£|EUR|USD|GBP))\b'

# Invoice / order / purchase-order numbers. Context-anchored: requires a
# trigger word (Rechnung/Rg/Invoice/INV/Order/PO/Auftrag/Bestellung) before
# digits >=3 or alpha-prefix-dash-digits. Bare integers stay safe.
[[policy.custom_recognizers]]
kind = "regex"
name = "invoice_order_number_de_en"
class = "custom:reference_number"
pattern = '(?i)\b(?:Rechnung(?:s?[-\s.]?(?:Nummer|Nr\.?))?|Rech\.?[-\s]?Nr\.?|R[Gg]?\.?[-\s]?Nr\.?|RNR\.?|Auftrag(?:s?[-\s.]?(?:Nummer|Nr\.?))?|Bestellung(?:s?[-\s.]?(?:Nummer|Nr\.?))?|Invoice(?:[-\s.]?(?:No\.?|Number|#))?|Inv\.?(?:[-\s.]?(?:No\.?|Number|#))?|Order(?:[-\s.]?(?:No\.?|Number|#))?|Purchase\s+Order|PO\.?|INV)[\s:\-#.]+#?(?:\d{3,}[\dA-Z\-]*|[A-Z]+-\d{2,}[\dA-Z\-]*)\b'

# Street addresses (DE + EN). DE: street-name + suffix (straße/strasse/gasse/
# platz/weg/allee/ring/damm) + house-number. EN: house-number + Title-Case
# word(s) + suffix (Street/St/Road/Rd/Avenue/Ave/Drive/Dr/Lane/Ln/Way).
# Maps to built-in `location` class.
[[policy.custom_recognizers]]
kind = "regex"
name = "street_address_de_en"
class = "location"
pattern = '(?:[A-ZÄÖÜ][a-zäöüß]+(?:straße|strasse|gasse|platz|weg|allee|ring|damm)\s+\d+[a-z]?|\d+\s+(?:[A-Z][a-z]+\s+){1,3}(?:Street|St\.?|Road|Rd\.?|Avenue|Ave\.?|Drive|Dr\.?|Lane|Ln\.?|Way))'

# Organizations with legal suffix. Title-Case run + GmbH/AG/UG/KG/OHG/SE/
# Inc/LLC/Ltd/Corp/Co./S.A./B.V./N.V. Note: greedy run can absorb a leading
# proper noun (e.g. "Berlin GmbH" eats "Berlin"); detection-order resolution
# usually picks longer span first.
[[policy.custom_recognizers]]
kind = "regex"
name = "org_with_legal_suffix"
class = "organization"
pattern = '(?:[A-Z][A-Za-zÄÖÜäöüß&.\-]+)(?:\s+[A-Z][A-Za-zÄÖÜäöüß&.\-]+){0,3}\s+(?:GmbH|AG|UG|KG|OHG|SE|Inc\.?|LLC|Ltd\.?|Corp\.?|Co\.?|S\.A\.|B\.V\.|N\.V\.)'

# Rules - declaration order is tiebreak when classes overlap.

[[rule]]
kind = "class"
class = "email"
action = "tokenize"

[[rule]]
kind = "class"
class = "name"
action = "tokenize"

[[rule]]
kind = "class"
class = "location"
action = "tokenize"

[[rule]]
kind = "class"
class = "organization"
action = "tokenize"

[[rule]]
kind = "class"
class = "custom:phone"
action = "tokenize"

[[rule]]
kind = "class"
class = "custom:iban"
action = "tokenize"

[[rule]]
kind = "class"
class = "custom:credit_card"
action = "tokenize"

[[rule]]
kind = "class"
class = "custom:ip_address"
action = "tokenize"

[[rule]]
kind = "class"
class = "custom:postal_code"
action = "tokenize"

[[rule]]
kind = "class"
class = "custom:amount"
action = "tokenize"

[[rule]]
kind = "class"
class = "custom:reference_number"
action = "tokenize"

[[rule]]
kind = "default"
action = "preserve"

# [ner]
# Uncomment after running `php artisan gaze:install-ner` or pass --update-policy.
# model_dir = "storage/app/gaze-ner/davlan-mbert-ner-hrl-int8"
# locale = "de"          # optional BCP47 (single string)
# threshold = 0.4        # optional 0.0..=1.0
