name: "🐛 Bug report"
description: "Report a regression or unexpected behavior in gaze-laravel"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can maintainers reproduce the issue?
      placeholder: |
        1. Install ...
        2. Configure ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include PHP, Laravel, gaze-laravel, OS, and Gaze binary versions.
      value: |
        - PHP version:
        - Laravel version:
        - gaze-laravel version:
        - OS:
        - Gaze binary version:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/stack trace
      description: Paste relevant logs or stack trace output.
      render: shell
  - type: checkboxes
    id: existing
    attributes:
      label: Existing issues
      options:
        - label: Have you checked existing issues?
          required: true
