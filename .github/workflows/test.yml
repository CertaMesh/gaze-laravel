name: tests

on:
  workflow_dispatch:
  # Auto-triggers temporarily disabled while GitHub Actions billing on the
  # PIInuts org is being resolved. Re-enable by uncommenting the two blocks
  # below. Local enforcement runs via the `.githooks/pre-push` hook —
  # `composer install` / `composer update` auto-wires `core.hooksPath`.
  # push:
  #   branches: [main]
  # pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        laravel: ['11.*', '12.*']
        include:
          - laravel: 11.*
            testbench: 9.*
          - laravel: 12.*
            testbench: 10.*

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    env:
      GAZE_SKIP_BINARY_DOWNLOAD: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, phar
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Pin Laravel and Testbench versions
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Pest
        run: composer test

      - name: Run PHPStan
        run: composer analyse
