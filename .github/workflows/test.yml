name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: "PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        laravel: ["^11.0", "^12.0", "^13.0"]
        exclude:
          # Laravel 13 requires PHP >= 8.3
          - php: "8.2"
            laravel: "^13.0"
          # Laravel 11 is EOL-adjacent and never targeted PHP 8.5;
          # 8.5 is exercised against the actively supported 12/13 lines.
          - php: "8.5"
            laravel: "^11.0"

    env:
      GAZE_SKIP_BINARY_DOWNLOAD: "1"
      # GAZE_VERSION is exported after "Install dependencies" from the single
      # source of truth, BinaryDownloader::PINNED_VERSION — no literal here.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sqlite3, mbstring, json, openssl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.json', 'composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php }}-${{ matrix.laravel }}-
            composer-${{ matrix.php }}-

      - name: Allow advisory-flagged framework patches (compat matrix only)
        # The compatibility matrix pins EOL-adjacent Laravel patch releases that
        # Composer now refuses to load due to security advisories. These are the
        # framework-under-test, not gaze-laravel's shipped runtime deps, so we
        # disable advisory blocking for dependency resolution in CI ONLY — never
        # committed to composer.json.
        run: composer config policy.advisories.block false

      - name: Pin Laravel ${{ matrix.laravel }}
        run: >
          composer require
          "illuminate/contracts:${{ matrix.laravel }}"
          "illuminate/console:${{ matrix.laravel }}"
          "illuminate/encryption:${{ matrix.laravel }}"
          "illuminate/process:${{ matrix.laravel }}"
          "illuminate/support:${{ matrix.laravel }}"
          --no-update --no-interaction

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --prefer-stable --optimize-autoloader

      - name: Export pinned gaze version
        # Single source of truth: BinaryDownloader::PINNED_VERSION. Keeps the
        # CI pin from drifting when the constant is bumped.
        run: |
          echo "GAZE_VERSION=$(php -r 'require "vendor/autoload.php"; echo CertaMesh\Gaze\Install\BinaryDownloader::PINNED_VERSION;')" >> "$GITHUB_ENV"

      - name: Run tests
        run: composer test

      - name: Run static analysis
        run: composer analyse

  prefer-lowest:
    name: "PHP 8.2 / prefer-lowest"
    runs-on: ubuntu-latest

    env:
      GAZE_SKIP_BINARY_DOWNLOAD: "1"
      GAZE_VERSION: "0.11.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: sqlite3, mbstring, json, openssl
          coverage: none

      - name: Allow advisory-flagged framework patches (lower-bound validation only)
        # prefer-lowest exists to prove the declared minimums still install and
        # pass; the lowest satisfiable Laravel 11 releases are advisory-flagged
        # (framework-under-test, not gaze-laravel's shipped runtime deps), so
        # advisory blocking is disabled for dependency resolution in CI ONLY —
        # never committed to composer.json.
        run: composer config policy.advisories.block false

      - name: Install lowest dependencies
        run: composer update --no-interaction --prefer-dist --prefer-lowest --prefer-stable

      - name: Run tests
        run: composer test

      - name: Run static analysis
        run: composer analyse

  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
          # Skip the lockfile: it locks Symfony 8.x which requires PHP 8.4,
          # while this job intentionally runs PHP 8.3 to mirror the test matrix.

      - run: composer format -- --test
        # `--test` is Pint's dry-run flag: fails if any file would be reformatted.
